<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>March Madness Survivor Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .bracket{display:flex;align-items:stretch;gap:12px;min-width:1050px;min-height:520px}
    .bracket-col{display:flex;flex-direction:column;justify-content:space-around;gap:8px}
    .bracket-col.s16{width:185px}
    .bracket-col.e8{width:165px}
    .bracket-col.center{width:180px;justify-content:center}
    .region-half{display:flex;flex-direction:column;gap:8px}
    .region-spacer{height:24px}
    .game-card{border-radius:8px;padding:8px;border:1px solid #374151;background:rgba(31,41,55,0.4)}
    .game-card.formal-game{border-color:rgba(202,138,4,0.6);background:rgba(113,63,18,0.3)}
    .game-card.placeholder{opacity:0.5;border-style:dashed}
    .game-card .region-label{font-size:10px;color:#9ca3af;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em}
    .game-card .round-label{font-size:9px;color:#6b7280;margin-bottom:2px}
    .team-row{display:flex;align-items:center;gap:4px;margin-bottom:4px}
    .team-row:last-child{margin-bottom:0}
    .team-btn{flex:1;text-align:left;padding:4px 8px;border-radius:4px;font-size:11px;border:1px solid #374151;background:#1f2937;color:#d1d5db;cursor:pointer;transition:background 0.15s}
    .team-btn:hover{background:#374151}
    .team-btn.picked{background:#4b5563;border-color:#9ca3af;color:#fff}
    .team-btn.formal-picked{background:rgba(113,63,18,0.4);border-color:rgba(202,138,4,0.4);color:#fef3c7;opacity:0.6}
    .team-btn .seed{font-weight:700}
    .team-btn .burned-tag{font-size:9px;color:#f87171}
    .star-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:4px;border:1px solid #374151;font-size:13px;cursor:pointer;background:#1f2937;color:#6b7280;transition:all 0.15s}
    .star-btn:hover:not(:disabled){background:rgba(113,63,18,0.3);border-color:rgba(161,98,7,0.7)}
    .star-btn.active{background:#a16207;border-color:#ca8a04;color:#fef9c3}
    .star-btn:disabled{cursor:not-allowed;opacity:0.3}
    .tbd-slot{flex:1;padding:4px 8px;border-radius:4px;font-size:11px;border:1px dashed #374151;color:#4b5563;text-align:center}
    .connector{position:relative}
    .connector::after{content:'';position:absolute;top:50%;width:12px;height:1px;background:#374151}
    .connector-r::after{right:-12px}
    .connector-l::after{left:-12px}
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
<div id="app"></div>
<script>
const TEAMS = [
  {name:'Duke',seed:1,region:'East'},{name:'UConn',seed:2,region:'East'},{name:'Michigan State',seed:3,region:'East'},{name:'St. John\'s',seed:5,region:'East'},
  {name:'Iowa',seed:9,region:'South'},{name:'Nebraska',seed:4,region:'South'},{name:'Illinois',seed:3,region:'South'},{name:'Houston',seed:2,region:'South'},
  {name:'Arizona',seed:1,region:'West'},{name:'Arkansas',seed:4,region:'West'},{name:'Texas',seed:11,region:'West'},{name:'Purdue',seed:2,region:'West'},
  {name:'Michigan',seed:1,region:'Midwest'},{name:'Alabama',seed:4,region:'Midwest'},{name:'Iowa State',seed:2,region:'Midwest'},{name:'Tennessee',seed:6,region:'Midwest'},
];

const S16_GAMES = [
  {region:'South',teams:['Iowa','Nebraska'],id:'S1'},{region:'South',teams:['Illinois','Houston'],id:'S2'},
  {region:'West',teams:['Arizona','Arkansas'],id:'W1'},{region:'West',teams:['Texas','Purdue'],id:'W2'},
  {region:'East',teams:['Duke','St. John\'s'],id:'E1'},{region:'East',teams:['Michigan State','UConn'],id:'E2'},
  {region:'Midwest',teams:['Michigan','Alabama'],id:'M1'},{region:'Midwest',teams:['Iowa State','Tennessee'],id:'M2'},
];

const DEFAULT_ENTRIES = [
  {name:'Big1',burned:['Alabama','Illinois','UConn','Arkansas','Tennessee','Vanderbilt']},
  {name:'Chris1',burned:['St. John\'s','Arkansas','UConn','Vanderbilt']},
  {name:'Chris2',burned:['Illinois','Purdue','Arkansas','Kansas']},
  {name:'Me',burned:['Vanderbilt','St. John\'s','Arkansas','UConn']},
];

let state = {entries:[],activeEntryId:null};

function load(){
  try{const s=localStorage.getItem('mm26survivor');if(s)Object.assign(state,JSON.parse(s));}catch(e){}
  if(!state.entries.length){
    DEFAULT_ENTRIES.forEach((def,idx)=>{
      state.entries.push({id:'e'+idx,name:def.name,burned:def.burned,formal:{},scenario:{}});
    });
  }else{
    state.entries.forEach(e=>{
      if(!e.formal)e.formal={};if(!e.scenario)e.scenario={};
      delete e.dayPicks;delete e.situational;delete e.probs;delete e.paths;
    });
  }
  if(!state.activeEntryId&&state.entries.length)state.activeEntryId=state.entries[0].id;
}

function save(){localStorage.setItem('mm26survivor',JSON.stringify(state));}
function activeEntry(){return state.entries.find(e=>e.id===state.activeEntryId);}
function reset(){if(!confirm('Reset all?'))return;localStorage.removeItem('mm26survivor');state={entries:[],activeEntryId:null};load();save();render();}

function formalKey(round,formalGroup){return round+'_g'+formalGroup;}

function getFormalGroup(round,game){
  if(round==='FF'||round==='CHAMP')return 0;
  if(game.region==='South'||game.region==='West')return 1;
  return 2;
}

// Get all winners for a round (scenario + formal picks counted as winners)
function getRoundWinners(entry,round,games){
  const picks={...entry.scenario[round]||{}};
  Object.entries(entry.formal).forEach(([key,team])=>{
    if(key.startsWith(round)){
      const game=games.find(g=>g.teams.includes(team));
      if(game)picks[game.id]=team;
    }
  });
  return picks;
}

function getS16Winners(entry){return getRoundWinners(entry,'S16',S16_GAMES);}

function buildE8Data(entry){
  const w=getS16Winners(entry);
  return [
    {id:'E8_E',region:'East',teams:[w['E1']||null,w['E2']||null]},
    {id:'E8_S',region:'South',teams:[w['S1']||null,w['S2']||null]},
    {id:'E8_W',region:'West',teams:[w['W1']||null,w['W2']||null]},
    {id:'E8_M',region:'Midwest',teams:[w['M1']||null,w['M2']||null]},
  ];
}

function buildFFData(entry,e8Data){
  const e8Games=e8Data.filter(g=>g.teams[0]&&g.teams[1]);
  const w=getRoundWinners(entry,'E8',e8Games);
  return [
    {id:'FF_1',region:'East/Midwest',teams:[w['E8_E']||null,w['E8_M']||null]},
    {id:'FF_2',region:'South/West',teams:[w['E8_S']||null,w['E8_W']||null]},
  ];
}

function buildChampData(entry,ffData){
  const ffGames=ffData.filter(g=>g.teams[0]&&g.teams[1]);
  const w=getRoundWinners(entry,'FF',ffGames);
  return [{id:'CHAMP_1',region:'Championship',teams:[w['FF_1']||null,w['FF_2']||null]}];
}

function setFormal(entryId,round,formalGroup,gameId,team){
  const e=state.entries.find(x=>x.id===entryId);if(!e)return;
  const key=formalKey(round,formalGroup);
  const burned=e.burned||[];

  if(e.formal[key]===team){delete e.formal[key];save();render();return;}
  if(burned.includes(team))return;
  const otherFormals=Object.entries(e.formal).filter(([k])=>k!==key).map(([,v])=>v);
  if(otherFormals.includes(team))return;

  if(!e.scenario[round])e.scenario[round]={};
  if(e.scenario[round][gameId]===team)delete e.scenario[round][gameId];

  e.formal[key]=team;
  save();render();
}

function setScenario(entryId,round,gameId,team){
  const e=state.entries.find(x=>x.id===entryId);if(!e)return;
  if(!e.scenario[round])e.scenario[round]={};

  if(e.scenario[round][gameId]===team){
    delete e.scenario[round][gameId];
    clearDownstream(e,round,gameId);
    save();render();return;
  }

  e.scenario[round][gameId]=team;
  clearDownstream(e,round,gameId);
  save();render();
}

function clearDownstream(entry,round){
  if(round==='S16'){
    const e8Data=buildE8Data(entry);
    const activeE8=e8Data.filter(g=>g.teams[0]&&g.teams[1]);
    if(entry.scenario.E8){
      Object.keys(entry.scenario.E8).forEach(e8Id=>{
        const g=activeE8.find(x=>x.id===e8Id);
        if(g){if(entry.scenario.E8[e8Id]&&!g.teams.includes(entry.scenario.E8[e8Id]))delete entry.scenario.E8[e8Id];}
        else delete entry.scenario.E8[e8Id];
      });
    }
    Object.entries(entry.formal).forEach(([key,team])=>{
      if(key.startsWith('E8')){const g=activeE8.find(x=>x.teams.includes(team));if(!g)delete entry.formal[key];}
    });
    clearDownstream(entry,'E8');
  }else if(round==='E8'){
    const e8Data=buildE8Data(entry);
    const ffData=buildFFData(entry,e8Data);
    const activeFF=ffData.filter(g=>g.teams[0]&&g.teams[1]);
    if(entry.scenario.FF){
      Object.keys(entry.scenario.FF).forEach(fId=>{
        const g=activeFF.find(x=>x.id===fId);
        if(g){if(entry.scenario.FF[fId]&&!g.teams.includes(entry.scenario.FF[fId]))delete entry.scenario.FF[fId];}
        else delete entry.scenario.FF[fId];
      });
    }
    Object.entries(entry.formal).forEach(([key,team])=>{
      if(key.startsWith('FF')){const g=activeFF.find(x=>x.teams.includes(team));if(!g)delete entry.formal[key];}
    });
    clearDownstream(entry,'FF');
  }else if(round==='FF'){
    const e8Data=buildE8Data(entry);
    const ffData=buildFFData(entry,e8Data);
    const champData=buildChampData(entry,ffData);
    const activeC=champData.filter(g=>g.teams[0]&&g.teams[1]);
    if(entry.scenario.CHAMP){
      Object.keys(entry.scenario.CHAMP).forEach(cId=>{
        const g=activeC.find(x=>x.id===cId);
        if(g){if(entry.scenario.CHAMP[cId]&&!g.teams.includes(entry.scenario.CHAMP[cId]))delete entry.scenario.CHAMP[cId];}
        else delete entry.scenario.CHAMP[cId];
      });
    }
    Object.entries(entry.formal).forEach(([key,team])=>{
      if(key.startsWith('CHAMP')){const g=activeC.find(x=>x.teams.includes(team));if(!g)delete entry.formal[key];}
    });
  }
}

// ─── Rendering ─────────────────────────────────────────────

function render(){
  const entry=activeEntry();
  let html='<div class="flex flex-col h-screen bg-gray-950">';

  html+='<header class="bg-gray-900 border-b border-gray-800 px-5 py-3 flex items-center justify-between"><div><h1 class="text-xl font-bold">🏀 Survivor Planner</h1><p class="text-xs text-gray-500">Click team = scenario winner. Click ☆ = formal survivor pick.</p></div><button onclick="reset()" class="text-xs text-red-400 hover:text-red-300 px-3 py-1 border border-red-800 rounded">Reset</button></header>';

  html+='<div class="bg-gray-900 border-b border-gray-800 px-5 flex gap-0 overflow-x-auto">';
  state.entries.forEach(e=>{
    const active=e.id===state.activeEntryId;
    html+='<button onclick="switchEntry(\''+e.id+'\')" class="px-4 py-2 text-sm border-b-2 '+(active?'border-orange-500 text-white':'border-transparent text-gray-500 hover:text-gray-300')+'">'+e.name+'</button>';
  });
  html+='</div>';

  html+='<div class="flex-1 overflow-auto bg-gray-950 p-4">';
  if(entry)html+=renderBracket(entry);
  else html+='<div class="text-center text-gray-500 mt-20">No entry selected</div>';
  html+='</div></div>';

  document.getElementById('app').innerHTML=html;
}

function renderBracket(entry){
  const burned=entry.burned||[];
  const e8Data=buildE8Data(entry);
  const ffData=buildFFData(entry,e8Data);
  const champData=buildChampData(entry,ffData);

  // Summary by region
  const regions=['East','South','West','Midwest'];
  let html='<div class="mb-4 grid gap-2" style="grid-template-columns:repeat(4,1fr)">';
  regions.forEach(region=>{
    const regionBurned=burned.filter(t=>TEAMS.find(x=>x.name===t&&x.region===region));
    const regionFormals=Object.entries(entry.formal).filter(([,team])=>TEAMS.find(x=>x.name===team&&x.region===region)).map(([,t])=>t);
    html+='<div class="bg-gray-800/30 border border-gray-700 rounded p-2">';
    html+='<div class="text-xs font-bold text-blue-400 uppercase tracking-wide mb-1">'+region+'</div>';
    if(regionBurned.length){
      html+='<div class="text-[10px] text-red-400 font-semibold">Burned:</div>';
      regionBurned.forEach(t=>{html+='<div class="text-[10px] text-red-300">'+t+'</div>';});
    }
    if(regionFormals.length){
      html+='<div class="text-[10px] text-yellow-400 font-semibold">'+(regionBurned.length?'Formal:':'Formal:')+'</div>';
      regionFormals.forEach(t=>{
        const tm=TEAMS.find(x=>x.name===t);
        html+='<div class="text-[10px] text-yellow-200">★ '+(tm?tm.seed+' ':'')+t+'</div>';
      });
    }
    html+='</div>';
  });
  html+='</div>';

  // S16 games by region
  const eastS16=S16_GAMES.filter(g=>g.region==='East');
  const southS16=S16_GAMES.filter(g=>g.region==='South');
  const westS16=S16_GAMES.filter(g=>g.region==='West');
  const midwestS16=S16_GAMES.filter(g=>g.region==='Midwest');

  // E8 by region
  const eastE8=e8Data.find(g=>g.id==='E8_E');
  const southE8=e8Data.find(g=>g.id==='E8_S');
  const westE8=e8Data.find(g=>g.id==='E8_W');
  const midwestE8=e8Data.find(g=>g.id==='E8_M');

  // FF
  const ff1=ffData.find(g=>g.id==='FF_1'); // South/West
  const ff2=ffData.find(g=>g.id==='FF_2'); // East/Midwest
  const champ=champData[0];

  html+='<div class="overflow-x-auto"><div class="bracket">';

  // ── Column 1: Left S16 (East top, South bottom) ──
  html+='<div class="bracket-col s16">';
  html+='<div class="region-half">';
  html+='<div class="text-xs font-bold text-blue-400 uppercase tracking-wide mb-1">East</div>';
  eastS16.forEach(g=>html+=renderGameCard(entry,'S16',g,burned));
  html+='</div><div class="region-spacer"></div><div class="region-half">';
  html+='<div class="text-xs font-bold text-blue-400 uppercase tracking-wide mb-1">South</div>';
  southS16.forEach(g=>html+=renderGameCard(entry,'S16',g,burned));
  html+='</div></div>';

  // ── Column 2: Left E8 (East top, South bottom) ──
  html+='<div class="bracket-col e8">';
  html+='<div class="region-half" style="justify-content:center">';
  html+='<div class="text-[10px] font-bold text-purple-400 uppercase tracking-wide mb-1">E8</div>';
  html+=renderGameCard(entry,'E8',eastE8,burned);
  html+='</div><div class="region-spacer"></div><div class="region-half" style="justify-content:center">';
  html+='<div class="text-[10px] font-bold text-purple-400 uppercase tracking-wide mb-1">E8</div>';
  html+=renderGameCard(entry,'E8',southE8,burned);
  html+='</div></div>';

  // ── Column 3: Center (FF + Championship) ──
  html+='<div class="bracket-col center">';
  html+='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;height:100%">';

  // FF_1: East/Midwest (top of center — connects to East on left)
  html+='<div>';
  html+='<div class="text-[10px] font-bold text-green-400 uppercase tracking-wide mb-1 text-center">Final Four</div>';
  html+=renderGameCard(entry,'FF',ff1,burned);
  html+='</div>';

  // Championship
  html+='<div>';
  html+='<div class="text-[10px] font-bold text-yellow-400 uppercase tracking-wide mb-1 text-center">Championship</div>';
  html+=renderGameCard(entry,'CHAMP',champ,burned);
  html+='</div>';

  // FF_2: South/West (bottom of center — connects to South on left)
  html+='<div>';
  html+='<div class="text-[10px] font-bold text-green-400 uppercase tracking-wide mb-1 text-center">Final Four</div>';
  html+=renderGameCard(entry,'FF',ff2,burned);
  html+='</div>';

  html+='</div></div>';

  // ── Column 4: Right E8 (West top, Midwest bottom) ──
  html+='<div class="bracket-col e8">';
  html+='<div class="region-half" style="justify-content:center">';
  html+='<div class="text-[10px] font-bold text-purple-400 uppercase tracking-wide mb-1">E8</div>';
  html+=renderGameCard(entry,'E8',westE8,burned);
  html+='</div><div class="region-spacer"></div><div class="region-half" style="justify-content:center">';
  html+='<div class="text-[10px] font-bold text-purple-400 uppercase tracking-wide mb-1">E8</div>';
  html+=renderGameCard(entry,'E8',midwestE8,burned);
  html+='</div></div>';

  // ── Column 5: Right S16 (West top, Midwest bottom) ──
  html+='<div class="bracket-col s16">';
  html+='<div class="region-half">';
  html+='<div class="text-xs font-bold text-blue-400 uppercase tracking-wide mb-1">West</div>';
  westS16.forEach(g=>html+=renderGameCard(entry,'S16',g,burned));
  html+='</div><div class="region-spacer"></div><div class="region-half">';
  html+='<div class="text-xs font-bold text-blue-400 uppercase tracking-wide mb-1">Midwest</div>';
  midwestS16.forEach(g=>html+=renderGameCard(entry,'S16',g,burned));
  html+='</div></div>';

  html+='</div></div>';
  return html;
}

function renderGameCard(entry,round,game,burned){
  if(!game)return '';
  const hasBothTeams=game.teams[0]&&game.teams[1];
  const hasAnyTeam=game.teams[0]||game.teams[1];
  const fg=getFormalGroup(round,game);
  const fKey=formalKey(round,fg);
  const formalPick=entry.formal[fKey]||null;
  const otherFormals=Object.entries(entry.formal).filter(([k])=>k!==fKey).map(([,v])=>v);
  const scenarioPick=(entry.scenario[round]||{})[game.id]||null;
  const isFormalGame=formalPick&&(game.teams.includes(formalPick));

  let cls='game-card';
  if(isFormalGame)cls+=' formal-game';
  if(!hasAnyTeam)cls+=' placeholder';

  let html='<div class="'+cls+'">';
  html+='<div class="region-label">'+game.region+'</div>';

  game.teams.forEach(team=>{
    if(!team){
      // TBD slot
      html+='<div class="team-row"><div class="tbd-slot">TBD</div><div class="star-btn" style="opacity:0.2">☆</div></div>';
      return;
    }

    const t=TEAMS.find(x=>x.name===team);
    const seed=t?t.seed:'?';
    const isBurned=burned.includes(team);
    const isFormal=formalPick===team;
    const isScenario=scenarioPick===team;
    const isOtherFormal=otherFormals.includes(team);

    // Scenario button classes
    let btnCls='team-btn';
    if(isFormal)btnCls+=' formal-picked';
    else if(isScenario)btnCls+=' picked';

    // Star button
    let starCls='star-btn';
    let starDisabled=false;
    if(isFormal){starCls+=' active';}
    else if(isBurned||isOtherFormal){starDisabled=true;}

    const esc=team.replace(/'/g,"\\'");

    html+='<div class="team-row">';
    html+='<button class="'+btnCls+'" onclick="pickScenario(\''+entry.id+'\',\''+round+'\',\''+game.id+'\',\''+esc+'\')">';
    html+='<span class="seed">'+seed+'</span> '+team;
    if(isScenario&&!isFormal)html+=' ✓';
    if(isBurned)html+=' <span class="burned-tag">BURNED</span>';
    html+='</button>';
    html+='<button class="'+starCls+'" '+(starDisabled?'disabled':'')+' onclick="pickFormal(\''+entry.id+'\',\''+round+'\','+fg+',\''+game.id+'\',\''+esc+'\')">'+(isFormal?'★':'☆')+'</button>';
    html+='</div>';
  });

  html+='</div>';
  return html;
}

window.switchEntry=id=>{state.activeEntryId=id;render();};
window.pickFormal=(eid,round,fg,gid,team)=>setFormal(eid,round,fg,gid,team);
window.pickScenario=(eid,round,gid,team)=>setScenario(eid,round,gid,team);
window.reset=reset;

load();
render();
</script>
</body>
</html>
