<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>March Madness Survivor Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
<div id="app"></div>
<script>
const TEAMS = [
  {name:'Duke',seed:1,region:'East'},{name:'UConn',seed:2,region:'East'},{name:'Michigan State',seed:3,region:'East'},{name:'St. John\'s',seed:5,region:'East'},
  {name:'Iowa',seed:9,region:'South'},{name:'Nebraska',seed:4,region:'South'},{name:'Illinois',seed:3,region:'South'},{name:'Houston',seed:2,region:'South'},
  {name:'Arizona',seed:1,region:'West'},{name:'Arkansas',seed:4,region:'West'},{name:'Texas',seed:11,region:'West'},{name:'Purdue',seed:2,region:'West'},
  {name:'Michigan',seed:1,region:'Midwest'},{name:'Alabama',seed:4,region:'Midwest'},{name:'Iowa State',seed:2,region:'Midwest'},{name:'Tennessee',seed:6,region:'Midwest'},
];

const S16_GAMES = [
  {region:'South',teams:['Iowa','Nebraska'],id:'S1'},{region:'South',teams:['Illinois','Houston'],id:'S2'},
  {region:'West',teams:['Arizona','Arkansas'],id:'W1'},{region:'West',teams:['Texas','Purdue'],id:'W2'},
  {region:'East',teams:['Duke','St. John\'s'],id:'E1'},{region:'East',teams:['Michigan State','UConn'],id:'E2'},
  {region:'Midwest',teams:['Michigan','Alabama'],id:'M1'},{region:'Midwest',teams:['Iowa State','Tennessee'],id:'M2'},
];

const DEFAULT_ENTRIES = [
  {name:'Big1',burned:['Alabama','Illinois','UConn','Arkansas','Tennessee','Vanderbilt']},
  {name:'Chris1',burned:['St. John\'s','Arkansas','UConn','Vanderbilt']},
  {name:'Chris2',burned:['Illinois','Purdue','Arkansas','Kansas']},
  {name:'Me',burned:['Vanderbilt','St. John\'s','Arkansas','UConn']},
];

let state = {entries:[],activeEntryId:null,currentRound:'S16'};

function load(){
  try{const s=localStorage.getItem('mm26survivor');if(s)Object.assign(state,JSON.parse(s));}catch(e){}
  if(!state.entries.length){
    DEFAULT_ENTRIES.forEach((def,idx)=>{
      state.entries.push({
        id:'e'+idx,name:def.name,dayPicks:{},situational:{},burned:def.burned,
        probs:{S16:{},E8:{},FF:{},CHAMP:{}},paths:{}
      });
    });
  }else{
    state.entries.forEach(e=>{
      if(!e.dayPicks)e.dayPicks={};if(!e.situational)e.situational={};
      if(!e.probs)e.probs={S16:{},E8:{},FF:{},CHAMP:{}};
      if(!e.paths)e.paths={};
    });
  }
  if(!state.activeEntryId&&state.entries.length)state.activeEntryId=state.entries[0].id;
}

function save(){localStorage.setItem('mm26survivor',JSON.stringify(state));}
function activeEntry(){return state.entries.find(e=>e.id===state.activeEntryId);}
function reset(){if(!confirm('Reset all?'))return;localStorage.removeItem('mm26survivor');state.entries=[];DEFAULT_ENTRIES.forEach((def,idx)=>{state.entries.push({id:'e'+idx,name:def.name,dayPicks:{},situational:{},burned:def.burned,probs:{S16:{},E8:{},FF:{},CHAMP:{}},paths:{}})});state.activeEntryId=state.entries[0].id;save();render();}

function setProb(entryId,round,gameId,team,prob){
  const e=state.entries.find(x=>x.id===entryId);if(!e)return;
  if(!e.probs)e.probs={S16:{},E8:{},FF:{},CHAMP:{}};
  if(!e.probs[round])e.probs[round]={};

  if(round==='S16'){
    if(!e.probs[round][gameId])e.probs[round][gameId]={};
    e.probs[round][gameId][team]=parseFloat(prob)||0;
  }else{
    // For E8, FF, CHAMP, store by team name directly
    e.probs[round][team]=parseFloat(prob)||0;
  }
  save();render();
}

function calculatePathProb(entry,pick,round){
  // Calculate the full survival path probability starting with this pick in this round
  // For S16, assumes picks in E8 and FF are optimally planned
  if(round!=='S16')return 0;

  const game=S16_GAMES.find(g=>g.teams.includes(pick));
  if(!game)return 0;

  let pathProb=(entry.probs.S16[game.id]?.[pick]||50)/100;

  // For a complete path analysis, we'd need to:
  // 1. Identify which teams would advance (winners of their S16 games)
  // 2. Find best E8 picks from those teams
  // 3. Calculate their win probabilities
  // 4. Multiply all together
  // For now, show the single-round probability with note about full path

  return pathProb;
}

function findGameWithTeam(team,round){
  const games=round==='S16'?S16_GAMES:[];
  return games.find(g=>g.teams.includes(team));
}

function getGroup(team){
  const t=TEAMS.find(x=>x.name===team);
  return(t.region==='South'||t.region==='West')?1:2;
}

function getGroupRegions(group){
  return group===1?['South','West']:['East','Midwest'];
}

function setPick(entryId,round,team,type){
  const e=state.entries.find(x=>x.id===entryId);if(!e)return;
  if(!e.dayPicks)e.dayPicks={};if(!e.situational)e.situational={};
  if(!e.dayPicks[round])e.dayPicks[round]=[];
  if(!e.situational[round])e.situational[round]=[];

  const allRoundPicks=[...e.dayPicks[round],...e.situational[round]];
  const idx=allRoundPicks.indexOf(team);

  if(idx>=0){
    if(e.dayPicks[round].includes(team)){
      e.dayPicks[round]=e.dayPicks[round].filter(t=>t!==team);
    }else{
      e.situational[round]=e.situational[round].filter(t=>t!==team);
    }
  }else{
    if(round==='S16'||round==='E8'){
      const game=findGameWithTeam(team,round);
      if(game){
        const otherTeam=game.teams.find(t=>t!==team);
        if(allRoundPicks.includes(otherTeam)){return;}
      }
    }

    if(type==='day'){
      if(round==='S16'||round==='E8'){
        const group=getGroup(team);
        const groupRegions=getGroupRegions(group);
        const teamRegion=TEAMS.find(x=>x.name===team).region;
        const otherRegions=groupRegions.filter(r=>r!==teamRegion);
        otherRegions.forEach(r=>{
          const teamsInRegion=(e.dayPicks[round]||[]).filter(t=>TEAMS.find(x=>x.name===t&&x.region===r));
          teamsInRegion.forEach(t=>{
            e.dayPicks[round]=e.dayPicks[round].filter(x=>x!==t);
          });
        });
      }else if(round==='FF'||round==='CHAMP'){
        e.dayPicks[round]=[];
      }
      e.dayPicks[round].push(team);
    }else{
      e.situational[round].push(team);
    }
  }
  save();render();
}

function render(){
  const entry=activeEntry();
  let html='<div class="flex flex-col h-screen bg-gray-950"><header class="bg-gray-900 border-b border-gray-800 px-5 py-3"><h1 class="text-xl font-bold">🏀 Survivor Planner + Path Analyzer</h1><p class="text-xs text-gray-500">Input win % for all games. System shows full survival path probability.</p></header>';
  html+='<div class="bg-gray-900 border-b border-gray-800 px-5 flex gap-0 overflow-x-auto">';
  state.entries.forEach(e=>{html+='<button onclick="switchEntry(\''+e.id+'\')" class="px-4 py-2 text-sm border-b-2 '+(e.id===state.activeEntryId?'border-orange-500 text-white':'border-transparent text-gray-500')+'">●'+e.name+'</button>';});
  html+='</div><div class="flex-1 overflow-auto bg-gray-950 pb-96">';
  if(entry){html+=renderBracket(entry);}else{html+='<div class="text-center text-gray-500 mt-20">No entry</div>';}
  html+='</div></div>';
  document.getElementById('app').innerHTML=html;
}

function renderBracket(entry){
  const burned=entry.burned||[];
  if(!entry.dayPicks)entry.dayPicks={};if(!entry.situational)entry.situational={};
  const s16Day=entry.dayPicks.S16||[];
  const s16Sit=entry.situational.S16||[];
  const s16All=[...s16Day,...s16Sit];

  const e8Day=entry.dayPicks.E8||[];
  const e8Sit=entry.situational.E8||[];
  const e8All=[...e8Day,...e8Sit];

  const ffDay=entry.dayPicks.FF||[];
  const ffSit=entry.situational.FF||[];
  const ffAll=[...ffDay,...ffSit];

  const champDay=entry.dayPicks.CHAMP||[];
  const champSit=entry.situational.CHAMP||[];
  const champAll=[...champDay,...champSit];

  const allPicks=new Set([...s16All,...e8All,...ffAll,...champAll]);
  const availTeams=TEAMS.filter(t=>!burned.includes(t.name)&&!allPicks.has(t.name)).map(t=>t.name);

  function probInput(gameId,team){
    const prob=entry.probs.S16[gameId]?.[team]||50;
    return '<input type="number" min="0" max="100" value="'+prob+'" onchange="setProb(\''+entry.id+'\',\'S16\',\''+gameId+'\',\''+team+'\',this.value)" class="w-12 h-6 text-xs text-center bg-gray-700 text-gray-200 border border-gray-600 rounded" />';
  }

  function teamBtn(team,round,isPrimary){
    const t=TEAMS.find(x=>x.name===team);
    const isDayPick=(entry.dayPicks[round]||[]).includes(team);
    const isSituational=(entry.situational[round]||[]).includes(team);
    let cls='bg-gray-800 border border-gray-700 text-white hover:bg-gray-700 cursor-pointer';
    if(isDayPick){
      cls='bg-yellow-900/60 border-2 border-yellow-600 text-yellow-100';
    }else if(isSituational){
      cls='bg-gray-600/60 border-2 border-gray-500 text-gray-200';
    }
    const label=isPrimary?'day':'situational';
    const star=isDayPick?' ★':'';
    return '<button onclick="setPick(\''+entry.id+'\',\''+round+'\',\''+team+'\',\''+label+'\')" class="w-full text-left px-2 py-1.5 rounded text-xs '+cls+'"><span class="font-bold">'+t.seed+'</span> '+team+star+' </button>';
  }

  let html='<div class="p-6"><h2 class="text-lg font-bold mb-6">Bracket Analysis</h2><div class="overflow-x-auto"><div class="inline-flex gap-8 min-w-max">';

  // S16 - Show all games with probability inputs
  html+='<div><div class="text-sm font-bold text-blue-400 mb-4">Sweet 16 (Input Win %)</div><div class="space-y-3 w-56">';
  S16_GAMES.forEach(game=>{
    const t0=game.teams[0],t1=game.teams[1];
    html+='<div class="bg-gray-800/30 border border-gray-700 rounded p-2"><div class="text-xs text-gray-400 mb-1">'+game.region+'</div>';
    html+='<div class="flex gap-1 mb-1"><button onclick="setPick(\''+entry.id+'\',\'S16\',\''+t0+'\',\'day\')" class="flex-1 px-1 py-1 bg-gray-700 text-xs rounded hover:bg-gray-600">'+t0+'</button>'+probInput(game.id,t0)+'</div>';
    html+='<div class="flex gap-1"><button onclick="setPick(\''+entry.id+'\',\'S16\',\''+t1+'\',\'day\')" class="flex-1 px-1 py-1 bg-gray-700 text-xs rounded hover:bg-gray-600">'+t1+'</button>'+probInput(game.id,t1)+'</div>';
    html+='</div>';
  });
  html+='</div></div>';

  // Show detailed path analysis for S16 picks
  if(s16Day.length>0){
    html+='<div><div class="text-sm font-bold text-green-400 mb-4">Survival Path Analysis</div><div class="space-y-3 w-72">';
    s16Day.forEach(pick=>{
      const game=S16_GAMES.find(g=>g.teams.includes(pick));
      const pickProb=(entry.probs.S16[game.id]?.[pick]||50)/100;

      // Build path with E8 and FF picks
      const e8Pick=e8Day.find(t=>TEAMS.find(x=>x.name===t&&x.region===TEAMS.find(y=>y.name===pick).region));
      const e8Prob=e8Pick?(entry.probs.E8?.[e8Pick]||50)/100:1;
      const ffPick=ffDay[0];
      const ffProb=ffPick?((entry.probs.FF?.[ffPick]||50)/100):1;

      const fullPathProb=pickProb*e8Prob*ffProb;

      html+='<div class="bg-green-900/30 border border-green-600 rounded p-3"><div class="text-sm font-bold text-green-300">'+pick+'</div>';
      html+='<div class="text-xs text-gray-300 mt-1">Round 1: '+Math.round(pickProb*100)+'%';
      if(e8Pick)html+=' × '+Math.round(e8Prob*100)+'% ('+e8Pick+')';
      if(ffPick)html+=' × '+Math.round(ffProb*100)+'% ('+ffPick+')';
      html+='</div>';
      html+='<div class="text-sm font-bold text-green-200 mt-2">Full Path: '+Math.round(fullPathProb*100)+'%</div>';
      html+='</div>';
    });
    html+='</div></div>';
  }

  // Show other round inputs
  html+='<div><div class="text-sm font-bold text-purple-400 mb-4">E8 (Optional)</div><div class="space-y-2 w-44">';
  e8Day.forEach(pick=>{
    html+='<div class="flex items-center gap-1 text-xs"><span class="flex-1">'+pick+':</span><input type="number" min="0" max="100" value="'+(entry.probs.E8?.[pick]||50)+'" onchange="setProb(\''+entry.id+'\',\'E8\',\''+pick+'\',\''+pick+'\',this.value)" class="w-12 h-6 text-center bg-gray-700 text-gray-200 border border-gray-600 rounded" />%</div>';
  });
  html+='</div></div>';

  html+='<div><div class="text-sm font-bold text-purple-400 mb-4">FF (Optional)</div><div class="space-y-2 w-44">';
  ffDay.forEach(pick=>{
    html+='<div class="flex items-center gap-1 text-xs"><span class="flex-1">'+pick+':</span><input type="number" min="0" max="100" value="'+(entry.probs.FF?.[pick]||50)+'" onchange="setProb(\''+entry.id+'\',\'FF\',\''+pick+'\',\''+pick+'\',this.value)" class="w-12 h-6 text-center bg-gray-700 text-gray-200 border border-gray-600 rounded" />%</div>';
  });
  html+='</div></div>';

  html+='</div></div>';

  // Bottom: Show probability summary
  html+='<div class="fixed bottom-0 left-0 right-0 bg-gray-900 border-t border-gray-800 p-4"><h3 class="text-sm font-bold mb-2">💡 How It Works</h3><p class="text-xs text-gray-400">1. Input win % for each game above. 2. Pick your team. 3. System calculates: <span class="text-green-300">Pick Win % × Future Picks\' Win %</span> = Your full survival path probability.</p></div>';

  return html;
}

window.switchEntry=id=>{state.activeEntryId=id;render();};
window.setPick=setPick;
window.setProb=setProb;
window.reset=reset;

load();
render();
</script>
</body>
</html>
