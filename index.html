<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>March Madness 2026 Survivor Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
<div id="app"></div>
<script>
const TEAMS = [
  {name:'Duke',seed:1,region:'East'},{name:'UConn',seed:2,region:'East'},{name:'Michigan State',seed:3,region:'East'},{name:'St. John\'s',seed:5,region:'East'},
  {name:'Iowa',seed:9,region:'South'},{name:'Nebraska',seed:4,region:'South'},{name:'Illinois',seed:3,region:'South'},{name:'Houston',seed:2,region:'South'},
  {name:'Arizona',seed:1,region:'West'},{name:'Arkansas',seed:4,region:'West'},{name:'Texas',seed:11,region:'West'},{name:'Purdue',seed:2,region:'West'},
  {name:'Michigan',seed:1,region:'Midwest'},{name:'Alabama',seed:4,region:'Midwest'},{name:'Iowa State',seed:2,region:'Midwest'},{name:'Tennessee',seed:6,region:'Midwest'},
];

const S16_GAMES = [
  {region:'South',teams:['Iowa','Nebraska'],day:1},{region:'South',teams:['Illinois','Houston'],day:1},
  {region:'West',teams:['Arizona','Arkansas'],day:1},{region:'West',teams:['Texas','Purdue'],day:1},
  {region:'East',teams:['Duke','St. John\'s'],day:2},{region:'East',teams:['Michigan State','UConn'],day:2},
  {region:'Midwest',teams:['Michigan','Alabama'],day:2},{region:'Midwest',teams:['Iowa State','Tennessee'],day:2},
];

const DEFAULT_ENTRIES = [
  {name:'Big1',burned:['Alabama','Illinois','UConn','Arkansas','Tennessee','Vanderbilt']},
  {name:'Chris1',burned:['St. John\'s','Arkansas','UConn','Vanderbilt']},
  {name:'Chris2',burned:['Illinois','Purdue','Arkansas','Kansas']},
  {name:'Me',burned:['Vanderbilt','St. John\'s','Arkansas','UConn']},
];

let state = {entries:[],activeEntryId:null};

function load(){
  try{const s=localStorage.getItem('mm26survivor');if(s)Object.assign(state,JSON.parse(s));}catch(e){}
  if(!state.entries.length){DEFAULT_ENTRIES.forEach((def,idx)=>{state.entries.push({id:'e'+idx,name:def.name,dayPicks:{},situational:{},burned:def.burned})});}else{
    state.entries.forEach(e=>{
      if(!e.dayPicks)e.dayPicks={};if(!e.situational)e.situational={};
      if(e.picks){delete e.picks;}if(e.dayPicks.length===undefined)e.dayPicks={};
    });
  }
  if(!state.activeEntryId&&state.entries.length)state.activeEntryId=state.entries[0].id;
}

function save(){localStorage.setItem('mm26survivor',JSON.stringify(state));}

function activeEntry(){return state.entries.find(e=>e.id===state.activeEntryId);}

function reset(){if(!confirm('Reset all?'))return;localStorage.removeItem('mm26survivor');state.entries=[];DEFAULT_ENTRIES.forEach((def,idx)=>{state.entries.push({id:'e'+idx,name:def.name,dayPicks:{},situational:{},burned:def.burned})});state.activeEntryId=state.entries[0].id;save();render();}

function findGameWithTeam(team,round){
  const games=round==='S16'?S16_GAMES:[];
  return games.find(g=>g.teams.includes(team));
}

function getGroup(team){
  const t=TEAMS.find(x=>x.name===team);
  return(t.region==='South'||t.region==='West')?1:2;
}

function getGroupRegions(group){
  return group===1?['South','West']:['East','Midwest'];
}

function setPick(entryId,round,team,type){
  const e=state.entries.find(x=>x.id===entryId);if(!e)return;
  if(!e.dayPicks)e.dayPicks={};if(!e.situational)e.situational={};
  if(!e.dayPicks[round])e.dayPicks[round]=[];
  if(!e.situational[round])e.situational[round]=[];

  const allRoundPicks=[...e.dayPicks[round],...e.situational[round]];
  const idx=allRoundPicks.indexOf(team);

  if(idx>=0){
    if(e.dayPicks[round].includes(team)){
      e.dayPicks[round]=e.dayPicks[round].filter(t=>t!==team);
    }else{
      e.situational[round]=e.situational[round].filter(t=>t!==team);
    }
  }else{
    if(round==='S16'||round==='E8'){
      const game=findGameWithTeam(team,round);
      if(game){
        const otherTeam=game.teams.find(t=>t!==team);
        if(allRoundPicks.includes(otherTeam)){return;}
      }
    }

    if(type==='day'){
      if(round==='S16'||round==='E8'){
        const group=getGroup(team);
        const groupRegions=getGroupRegions(group);
        const teamRegion=TEAMS.find(x=>x.name===team).region;
        const otherRegions=groupRegions.filter(r=>r!==teamRegion);
        otherRegions.forEach(r=>{
          const teamsInRegion=(e.dayPicks[round]||[]).filter(t=>TEAMS.find(x=>x.name===t&&x.region===r));
          teamsInRegion.forEach(t=>{
            e.dayPicks[round]=e.dayPicks[round].filter(x=>x!==t);
          });
        });
      }else if(round==='FF'||round==='CHAMP'){
        e.dayPicks[round]=[];
      }
      e.dayPicks[round].push(team);
    }else{
      e.situational[round].push(team);
    }
  }
  save();render();
}

function render(){
  const entry=activeEntry();
  let html='<div class="flex flex-col h-screen bg-gray-950"><header class="bg-gray-900 border-b border-gray-800 px-5 py-3"><h1 class="text-xl font-bold">🏀 Survivor Planner</h1><p class="text-xs text-gray-500">★ = day pick (required) | Gray = situational (scenario testing)</p></header>';
  html+='<div class="bg-gray-900 border-b border-gray-800 px-5 flex gap-0 overflow-x-auto">';
  state.entries.forEach(e=>{html+='<button onclick="switchEntry(\''+e.id+'\')" class="px-4 py-2 text-sm border-b-2 '+(e.id===state.activeEntryId?'border-orange-500 text-white':'border-transparent text-gray-500')+'">●'+e.name+'</button>';});
  html+='</div><div class="flex-1 overflow-auto bg-gray-950 pb-96">';
  if(entry){html+=renderBracket(entry);}else{html+='<div class="text-center text-gray-500 mt-20">No entry</div>';}
  html+='</div></div>';
  document.getElementById('app').innerHTML=html;
}

function getHigherSeedTeam(team1,team2){
  const t1=TEAMS.find(x=>x.name===team1);
  const t2=TEAMS.find(x=>x.name===team2);
  return t1.seed<t2.seed?team1:team2;
}

function renderBracket(entry){
  const burned=entry.burned||[];
  if(!entry.dayPicks)entry.dayPicks={};if(!entry.situational)entry.situational={};
  const s16Day=entry.dayPicks.S16||[];
  const s16Sit=entry.situational.S16||[];
  const s16All=[...s16Day,...s16Sit];

  const e8Day=entry.dayPicks.E8||[];
  const e8Sit=entry.situational.E8||[];
  const e8All=[...e8Day,...e8Sit];

  const ffDay=entry.dayPicks.FF||[];
  const ffSit=entry.situational.FF||[];
  const ffAll=[...ffDay,...ffSit];

  const champDay=entry.dayPicks.CHAMP||[];
  const champSit=entry.situational.CHAMP||[];
  const champAll=[...champDay,...champSit];

  const allPicks=new Set([...s16All,...e8All,...ffAll,...champAll]);
  const availTeams=TEAMS.filter(t=>!burned.includes(t.name)&&!allPicks.has(t.name)).map(t=>t.name);

  function teamBtn(team,round,isPrimary){
    const t=TEAMS.find(x=>x.name===team);
    const isDayPick=(entry.dayPicks[round]||[]).includes(team);
    const isSituational=(entry.situational[round]||[]).includes(team);
    let cls='bg-gray-800 border border-gray-700 text-white hover:bg-gray-700 cursor-pointer';
    if(isDayPick){
      cls='bg-yellow-900/60 border-2 border-yellow-600 text-yellow-100';
    }else if(isSituational){
      cls='bg-gray-600/60 border-2 border-gray-500 text-gray-200';
    }
    const label=isPrimary?'day':'situational';
    const star=isDayPick?' ★':'';
    return '<button onclick="setPick(\''+entry.id+'\',\''+round+'\',\''+team+'\',\''+label+'\')" class="w-full text-left px-2 py-1.5 rounded text-xs '+cls+'"><span class="font-bold">'+t.seed+'</span> '+team+star+' </button>';
  }

  let html='<div class="p-6"><h2 class="text-lg font-bold mb-6">Bracket</h2><div class="overflow-x-auto"><div class="inline-flex gap-8 min-w-max">';

  // S16
  html+='<div><div class="text-sm font-bold text-blue-400 mb-4">Sweet 16</div><div class="space-y-6">';
  const regions=['South','West','East','Midwest'];
  const groups={1:{label:'South/West',regions:['South','West']},2:{label:'East/Midwest',regions:['East','Midwest']}};

  Object.values(groups).forEach(g=>{
    html+='<div><div class="text-xs font-semibold text-gray-400 mb-2">'+g.label+' (1 pick)</div>';
    g.regions.forEach(r=>{
      const games=S16_GAMES.filter(x=>x.region===r);
      html+='<div class="text-xs text-gray-500 mb-1">'+r+'</div>';
      games.forEach(game=>{
        html+='<div class="bg-gray-800/30 rounded border border-gray-700 p-2 space-y-0.5">';
        game.teams.forEach(t=>html+=teamBtn(t,'S16',true));
        html+='</div>';
      });
    });
    html+='</div>';
  });
  html+='</div></div>';

  // E8
  html+='<div><div class="text-sm font-bold text-violet-400 mb-4">Elite 8</div><div class="space-y-6">';
  Object.values(groups).forEach(g=>{
    html+='<div><div class="text-xs font-semibold text-gray-400 mb-2">'+g.label+' (1 pick)</div>';
    g.regions.forEach(r=>{
      const regionDayPicks=e8Day.filter(t=>TEAMS.find(x=>x.name===t&&x.region===r));
      const regionSitPicks=e8Sit.filter(t=>TEAMS.find(x=>x.name===t&&x.region===r));
      const regionAll=[...regionDayPicks,...regionSitPicks];
      html+='<div><div class="text-xs text-gray-500 mb-1">'+r+'</div><div class="bg-gray-800/30 rounded border border-gray-700 p-2 space-y-0.5 min-h-20">';
      if(regionAll.length>0){
        regionAll.forEach(t=>html+=teamBtn(t,'E8',true));
        const regionGames=S16_GAMES.filter(x=>x.region===r);
        const unpickedGames=regionGames.filter(x=>!x.teams.some(t=>regionAll.includes(t)));
        if(unpickedGames.length>0){
          html+='<div class="text-xs text-gray-600 mt-2 pt-2 border-t border-gray-700">Scenario:</div>';
          const addTeam=getHigherSeedTeam(unpickedGames[0].teams[0],unpickedGames[0].teams[1]);
          if(availTeams.includes(addTeam))html+=teamBtn(addTeam,'E8',false);
        }
      }else{html+='<div class="text-xs text-gray-600">Pick S16</div>';}
      html+='</div></div>';
    });
    html+='</div>';
  });
  html+='</div></div>';

  // FF
  html+='<div><div class="text-sm font-bold text-yellow-400 mb-4">Final 4</div><div class="space-y-4">';
  html+='<div><div class="text-xs font-semibold text-gray-400 mb-2">Championship Pick (1)</div>';
  html+='<div class="bg-gray-800/30 rounded border border-gray-700 p-2 space-y-0.5 min-h-20">';
  if(ffAll.length>0){
    ffAll.forEach(t=>html+=teamBtn(t,'FF',true));
    html+='<div class="text-xs text-gray-600 mt-2 pt-2 border-t border-gray-700">Scenario:</div>';
    const scenarioTeams=availTeams.filter(t=>!ffAll.includes(t)).slice(0,2);
    scenarioTeams.forEach(t=>html+=teamBtn(t,'FF',false));
  }else{html+='<div class="text-xs text-gray-600">Pick E8</div>';}
  html+='</div></div></div>';

  // Champ
  html+='<div><div class="text-sm font-bold text-amber-400 mb-4">Championship</div><div class="space-y-4">';
  html+='<div><div class="text-xs font-semibold text-gray-400 mb-2">Champion Pick (1)</div>';
  html+='<div class="bg-gray-800/30 rounded border border-gray-700 p-2 space-y-0.5 min-h-24">';
  if(champAll.length>0){
    champAll.forEach(t=>html+=teamBtn(t,'CHAMP',true));
    html+='<div class="text-xs text-gray-600 mt-2 pt-2 border-t border-gray-700">Scenario:</div>';
    const scenarioTeams=availTeams.filter(t=>!champAll.includes(t)).slice(0,3);
    scenarioTeams.forEach(t=>html+=teamBtn(t,'CHAMP',false));
  }else{html+='<div class="text-xs text-gray-600">Pick FF</div>';}
  html+='</div></div></div>';

  html+='</div></div>';

  // Bottom: Available Teams
  html+='<div class="fixed bottom-0 left-0 right-0 bg-gray-900 border-t border-gray-800 p-4"><h3 class="text-sm font-bold mb-3">Remaining Teams</h3><div class="grid grid-cols-4 gap-4">';
  regions.forEach(r=>{
    html+='<div><div class="text-xs font-semibold text-gray-500 mb-2">'+r+'</div><div class="space-y-1 max-h-24 overflow-y-auto">';
    availTeams.filter(t=>TEAMS.find(x=>x.name===t&&x.region===r)).forEach(t=>{
      const team=TEAMS.find(x=>x.name===t);
      html+='<div class="text-xs px-2 py-1 rounded bg-gray-800/50 border border-gray-700"><span class="font-bold">'+team.seed+'</span> '+t+'</div>';
    });
    html+='</div></div>';
  });
  html+='</div></div>';

  return html;
}

window.switchEntry=id=>{state.activeEntryId=id;render();};
window.setPick=setPick;
window.reset=reset;

load();
render();
</script>
</body>
</html>
